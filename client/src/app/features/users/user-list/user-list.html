<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Users</h1>
    <button mat-raised-button color="primary" routerLink="/users/new">
      <mat-icon>add</mat-icon> Add User
    </button>
  </div>

  <div class="table-container mat-elevation-z8">
    <table mat-table [dataSource]="(users$ | async) ?? []" class="full-width-table">
      
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">
          <strong>{{ user.name }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let user">{{ user.role }}</td>
      </ng-container>

      <ng-container matColumnDef="location">
        <th mat-header-cell *matHeaderCellDef>Location</th>
        <td mat-cell *matCellDef="let user">{{ user.location }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let user" class="actions-cell">
          <button
            *ngIf="isAdmin"
            mat-icon-button
            color="accent"
            [routerLink]="['/users', user.id, 'edit']"
            (click)="$event.stopPropagation()"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            *ngIf="isAdmin"
            mat-icon-button
            color="warn"
            (click)="deleteUser(user.id); $event.stopPropagation()"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        [routerLink]="['/users', row.id]"
        class="clickable-row"
      ></tr>
    </table>
  </div>
</div>
